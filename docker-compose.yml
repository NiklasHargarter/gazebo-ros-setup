services:
  ros-gazebo:
    image: ghcr.io/niklashargarter/gazebo-ros-setup:${ROS_DISTRO:-humble}
    container_name: ros-gazebo-${ROS_DISTRO:-humble}
    command: /bin/zsh
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./workspace:/workspace
      - ./.zsh_history_dir:/root/.zsh_history_dir
    network_mode: "host"
